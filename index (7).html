<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>دار الأصالة - القياس والاستشارة</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f4f1ea;
    --card:#ffffff;
    --brand:#8a6d3b;
    --brand-dark:#6b5430;
    --text:#2b2b2b;
    --muted:#8a8a8a;
    --line:#e6e0d6;
    --danger:#c0392b;
    --ok:#2e7d52;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:#f4f1ea;
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .topbar{
    background:var(--brand);
    color:#fff;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .topbar h1{font-size:17px;font-weight:600;}
  .lang-switch{display:flex;gap:4px;}
  .lang-switch button{
    background:rgba(255,255,255,.18);
    border:none;color:#fff;
    padding:5px 9px;border-radius:6px;
    font-size:12px;cursor:pointer;
  }
  .lang-switch button.active{background:rgba(255,255,255,.9);color:var(--brand-dark);font-weight:700;}
  .wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    background:var(--card);
    width:100%;
    max-width:420px;
    border-radius:16px;
    padding:26px 22px;
    box-shadow:0 6px 24px rgba(0,0,0,.08);
  }
  .card h2{font-size:20px;margin-bottom:6px;color:var(--brand-dark);}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:20px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;margin-bottom:6px;color:#555;}
  .field input{
    width:100%;
    padding:12px 13px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:15px;
    background:#faf8f4;
  }
  .field input:focus{outline:none;border-color:var(--brand);background:#fff;}
  .btn{
    width:100%;
    padding:13px;
    background:var(--brand);
    color:#fff;border:none;
    border-radius:10px;
    font-size:16px;font-weight:600;
    cursor:pointer;
    margin-top:6px;
  }
  .btn:active{background:var(--brand-dark);}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .switch-link{
    text-align:center;
    margin-top:16px;
    font-size:14px;
    color:var(--muted);
  }
  .switch-link a{color:var(--brand);font-weight:600;cursor:pointer;text-decoration:none;}
  .msg{
    padding:11px 13px;
    border-radius:9px;
    font-size:13.5px;
    margin-bottom:14px;
    display:none;
    line-height:1.5;
  }
  .msg.error{background:#fdecea;color:var(--danger);display:block;}
  .msg.success{background:#e7f5ec;color:var(--ok);display:block;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}
  /* home screen */
  .home{
    flex:1;
    padding:24px 18px;
    display:none;
    flex-direction:column;
  }
  .home.active{display:flex;}
  .welcome-card{
    background:var(--card);
    border-radius:16px;
    padding:24px;
    box-shadow:0 4px 18px rgba(0,0,0,.06);
    text-align:center;
  }
  .welcome-card .avatar{
    width:70px;height:70px;border-radius:50%;
    background:var(--brand);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:700;
    margin:0 auto 14px;
  }
  .welcome-card h3{font-size:20px;margin-bottom:4px;}
  .welcome-card p{color:var(--muted);font-size:14px;margin-bottom:4px;}
  .logout-btn{
    margin-top:22px;
    background:#fff;
    color:var(--danger);
    border:1px solid #f0d5d2;
  }
  .logout-btn:active{background:#fdecea;}
  .spinner{
    display:inline-block;width:16px;height:16px;
    border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;
    animation:spin .7s linear infinite;
    vertical-align:middle;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-screen{
    position:fixed;inset:0;background:#f4f1ea;
    display:flex;align-items:center;justify-content:center;
    z-index:999;
  }
  .loading-screen .spinner{border-color:rgba(138,109,59,.3);border-top-color:var(--brand);width:34px;height:34px;}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
</div>

<div class="topbar">
  <h1 id="appTitle">دار الأصالة</h1>
  <div class="lang-switch">
    <button data-lang="ar" class="active">ع</button>
    <button data-lang="fa">فا</button>
    <button data-lang="en">EN</button>
  </div>
</div>

<!-- AUTH -->
<div class="wrap" id="authWrap">
  <div class="card">
    <div id="msg" class="msg"></div>

    <!-- LOGIN -->
    <div id="loginForm">
      <h2 data-i18n="loginTitle">تسجيل الدخول</h2>
      <p class="sub" data-i18n="loginSub">أدخل بريدك وكلمة المرور للدخول</p>
      <div class="field">
        <label data-i18n="email">البريد الإلكتروني</label>
        <input type="email" id="loginEmail" autocomplete="email">
      </div>
      <div class="field">
        <label data-i18n="password">كلمة المرور</label>
        <input type="password" id="loginPassword" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" data-i18n="loginBtn">دخول</button>
      <div class="switch-link">
        <span data-i18n="noAccount">ليس لديك حساب؟</span>
        <a id="toRegister" data-i18n="createAccount">إنشاء حساب</a>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none;">
      <h2 data-i18n="regTitle">إنشاء حساب</h2>
      <p class="sub" data-i18n="regSub">أدخل بياناتك لإنشاء حساب جديد</p>
      <div class="row2">
        <div class="field">
          <label data-i18n="firstName">الاسم</label>
          <input type="text" id="regFirst">
        </div>
        <div class="field">
          <label data-i18n="lastName">اللقب</label>
          <input type="text" id="regLast">
        </div>
      </div>
      <div class="field">
        <label data-i18n="phone">رقم الهاتف</label>
        <input type="tel" id="regPhone" autocomplete="tel">
      </div>
      <div class="field">
        <label data-i18n="email">البريد الإلكتروني</label>
        <input type="email" id="regEmail" autocomplete="email">
      </div>
      <div class="field">
        <label data-i18n="password">كلمة المرور</label>
        <input type="password" id="regPassword" autocomplete="new-password">
      </div>
      <button class="btn" id="registerBtn" data-i18n="regBtn">تسجيل</button>
      <div class="switch-link">
        <span data-i18n="haveAccount">لديك حساب بالفعل؟</span>
        <a id="toLogin" data-i18n="loginLink">تسجيل الدخول</a>
      </div>
    </div>
  </div>
</div>

<!-- HOME (after login) -->
<div class="home" id="homeScreen">
  <div class="welcome-card">
    <div class="avatar" id="userAvatar">?</div>
    <h3 id="userName">—</h3>
    <p id="userEmail">—</p>
    <p id="userPhone">—</p>
    <p style="margin-top:10px;color:var(--ok);font-weight:600;" data-i18n="loggedIn">تم تسجيل الدخول بنجاح ✓</p>
    <button class="btn logout-btn" id="logoutBtn" data-i18n="logout">تسجيل الخروج</button>
  </div>
</div>

<script>
// ============ CONFIG ============
const SUPABASE_URL = "https://iwzoawrosnvddlytxmil.supabase.co";
const SUPABASE_KEY = "sb_publishable_P7wchWGrULkotCQ0K1R3uA_XVz3Od9m";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============ I18N ============
const I18N = {
  ar:{
    appTitle:"دار الأصالة", loginTitle:"تسجيل الدخول", loginSub:"أدخل بريدك وكلمة المرور للدخول",
    email:"البريد الإلكتروني", password:"كلمة المرور", loginBtn:"دخول",
    noAccount:"ليس لديك حساب؟", createAccount:"إنشاء حساب",
    regTitle:"إنشاء حساب", regSub:"أدخل بياناتك لإنشاء حساب جديد",
    firstName:"الاسم", lastName:"اللقب", phone:"رقم الهاتف", regBtn:"تسجيل",
    haveAccount:"لديك حساب بالفعل؟", loginLink:"تسجيل الدخول",
    loggedIn:"تم تسجيل الدخول بنجاح ✓", logout:"تسجيل الخروج",
    fillAll:"يرجى تعبئة جميع الحقول", regSuccess:"تم إنشاء الحساب بنجاح!",
    loginError:"البريد أو كلمة المرور غير صحيحة", genericError:"حدث خطأ، حاول مرة أخرى",
    pwShort:"كلمة المرور يجب أن تكون 6 أحرف على الأقل"
  },
  fa:{
    appTitle:"دار الأصالة", loginTitle:"ورود", loginSub:"ایمیل و رمز عبور خود را وارد کنید",
    email:"ایمیل", password:"رمز عبور", loginBtn:"ورود",
    noAccount:"حساب نداری؟", createAccount:"ساخت حساب",
    regTitle:"ساخت حساب", regSub:"اطلاعاتت را برای ساخت حساب وارد کن",
    firstName:"نام", lastName:"نام خانوادگی", phone:"شماره موبایل", regBtn:"ثبت‌نام",
    haveAccount:"حساب داری؟", loginLink:"ورود",
    loggedIn:"با موفقیت وارد شدی ✓", logout:"خروج",
    fillAll:"لطفاً همه فیلدها را پر کن", regSuccess:"حساب با موفقیت ساخته شد!",
    loginError:"ایمیل یا رمز عبور اشتباه است", genericError:"خطایی رخ داد، دوباره تلاش کن",
    pwShort:"رمز عبور باید حداقل ۶ کاراکتر باشد"
  },
  en:{
    appTitle:"Dar Al-Asala", loginTitle:"Login", loginSub:"Enter your email and password",
    email:"Email", password:"Password", loginBtn:"Login",
    noAccount:"Don't have an account?", createAccount:"Create account",
    regTitle:"Create Account", regSub:"Enter your details to register",
    firstName:"First name", lastName:"Last name", phone:"Phone", regBtn:"Register",
    haveAccount:"Already have an account?", loginLink:"Login",
    loggedIn:"Logged in successfully ✓", logout:"Logout",
    fillAll:"Please fill all fields", regSuccess:"Account created successfully!",
    loginError:"Wrong email or password", genericError:"An error occurred, try again",
    pwShort:"Password must be at least 6 characters"
  }
};
let currentLang = "ar";

function applyLang(lang){
  currentLang = lang;
  const dict = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang==="en") ? "ltr" : "rtl";
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(dict[k]) el.textContent = dict[k];
  });
  document.querySelectorAll(".lang-switch button").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang===lang);
  });
}
function t(key){ return I18N[currentLang][key] || key; }

document.querySelectorAll(".lang-switch button").forEach(b=>{
  b.addEventListener("click", ()=>applyLang(b.dataset.lang));
});

// ============ UI HELPERS ============
const msgBox = document.getElementById("msg");
function showMsg(text, type){
  msgBox.textContent = text;
  msgBox.className = "msg " + type;
}
function clearMsg(){ msgBox.className = "msg"; msgBox.textContent=""; }

const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
document.getElementById("toRegister").onclick = ()=>{ loginForm.style.display="none"; registerForm.style.display="block"; clearMsg(); };
document.getElementById("toLogin").onclick = ()=>{ registerForm.style.display="none"; loginForm.style.display="block"; clearMsg(); };

// ============ AUTH ACTIONS ============
const registerBtn = document.getElementById("registerBtn");
registerBtn.onclick = async ()=>{
  clearMsg();
  const first = document.getElementById("regFirst").value.trim();
  const last  = document.getElementById("regLast").value.trim();
  const phone = document.getElementById("regPhone").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const pw    = document.getElementById("regPassword").value;
  if(!first || !last || !phone || !email || !pw){ showMsg(t("fillAll"),"error"); return; }
  if(pw.length < 6){ showMsg(t("pwShort"),"error"); return; }

  registerBtn.disabled = true;
  registerBtn.innerHTML = '<span class="spinner"></span>';
  try{
    const { data, error } = await sb.auth.signUp({ email, password: pw });
    if(error) throw error;
    const userId = data.user?.id;
    if(userId){
      // create profile row
      const { error: pErr } = await sb.from("profiles").insert({
        id:userId, first_name:first, last_name:last, phone, email, role:"customer"
      });
      if(pErr) console.warn("profile insert:", pErr.message);
    }
    // try auto sign-in (works because confirm email is off)
    const { error: sErr } = await sb.auth.signInWithPassword({ email, password: pw });
    if(sErr){ showMsg(t("regSuccess"),"success"); registerForm.style.display="none"; loginForm.style.display="block"; }
    // onAuthStateChange handles the rest
  }catch(err){
    showMsg(err.message || t("genericError"),"error");
  }finally{
    registerBtn.disabled = false;
    registerBtn.textContent = t("regBtn");
  }
};

const loginBtn = document.getElementById("loginBtn");
loginBtn.onclick = async ()=>{
  clearMsg();
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPassword").value;
  if(!email || !pw){ showMsg(t("fillAll"),"error"); return; }
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="spinner"></span>';
  try{
    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    if(error){ showMsg(t("loginError"),"error"); }
  }catch(err){
    showMsg(t("genericError"),"error");
  }finally{
    loginBtn.disabled = false;
    loginBtn.textContent = t("loginBtn");
  }
};

document.getElementById("logoutBtn").onclick = async ()=>{
  await sb.auth.signOut();
};

// ============ SESSION / ROUTING ============
const authWrap = document.getElementById("authWrap");
const homeScreen = document.getElementById("homeScreen");
const loadingScreen = document.getElementById("loadingScreen");

async function showHome(session){
  authWrap.style.display = "none";
  homeScreen.classList.add("active");
  // load profile
  let profile = null;
  try{
    const { data } = await sb.from("profiles").select("*").eq("id", session.user.id).single();
    profile = data;
  }catch(e){}
  const name = profile ? ((profile.first_name||"")+" "+(profile.last_name||"")).trim() : session.user.email;
  document.getElementById("userName").textContent = name || "—";
  document.getElementById("userEmail").textContent = session.user.email || "—";
  document.getElementById("userPhone").textContent = profile?.phone || "—";
  document.getElementById("userAvatar").textContent = (name||"?").charAt(0).toUpperCase();
}
function showAuth(){
  homeScreen.classList.remove("active");
  authWrap.style.display = "flex";
}

sb.auth.onAuthStateChange((event, session)=>{
  if(session){ showHome(session); }
  else { showAuth(); }
});

// initial check
(async ()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ await showHome(session); } else { showAuth(); }
  loadingScreen.style.display = "none";
})();

applyLang("ar");
</script>
</body>
</html>
